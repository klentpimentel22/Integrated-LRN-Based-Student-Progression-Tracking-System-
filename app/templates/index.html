<!DOCTYPE html>
<html>
<head>
    <title>Student Tracking System</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .left-panel {
            width: 25%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .right-panel {
            width: 75%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .left-panel h3 {
            margin-bottom: 15px;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.97);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        select {
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .metric {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .empty-state {
            margin-top: 15px;
            color: gray;
        }
    </style>
</head>

<body>

<h1>Student Progression Tracking System</h1>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h3>Import Data</h3>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Import</button>
        </form>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="top-bar">
            <h3>Grade 7 S.Y</h3>
            <select>
                <option>Grade 7 - 2023</option>
                <option>Grade 8 - 2024</option>
            </select>
        </div>

        <div class="metric">
            Total Students: {{ total }}
        </div>

        <table>
            <tr>
                <th>LRN</th>
                <th>Name</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
            </tr>
            {% endfor %}
        </table>

        {% if students|length == 0 %}
        <p class="empty-state">No data yet. Upload a file to begin.</p>
        {% endif %}

        <div class="actions">
            <button>Delete</button>
            <button>Export</button>
        </div>

    </div>

</div>

</body>
</html>
